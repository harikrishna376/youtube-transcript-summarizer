<!DOCTYPE html>
<html>
<head>
    <title>YouTube Transcript Summary</title>
    <style>
        body { background-color: #e0f2f1; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { margin-top: 100px; border-radius: 15px; background: white; display: inline-block; padding: 40px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { width: 400px; padding: 12px; border-radius: 5px; border: 1px solid #4caf50; margin-bottom: 20px; }
        button { background-color: #4caf50; color: white; padding: 12px 30px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #2e7d32;">Summary</h1>
        <p>YouTube URL:</p>
        <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=...">
        <br>
        <button id="submitBtn">Generate Summary</button>
    </div>
</body>
</html>
